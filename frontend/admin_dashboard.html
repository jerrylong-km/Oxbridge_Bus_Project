<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    
    <script src="auth_guard.js?v=2"></script>
    <script>
        // 内联鉴权：立即执行，不依赖外部文件缓存
        (function() {
            var token = localStorage.getItem('access_token');
            var role = localStorage.getItem('user_role');
            if (!token || role !== 'SuperAdmin') {
                localStorage.removeItem('access_token');
                localStorage.removeItem('user_role');
                localStorage.removeItem('username');
                localStorage.removeItem('school_id');
                window.location.replace('/login.html');
            }
        })();
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxbridge Academy - 超級管理員審核工作台</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0f1d;
            --panel-bg: rgba(20, 30, 55, 0.6);
            --border-glow: rgba(0, 198, 255, 0.2);
            --accent-blue: #00c6ff;
            --accent-green: #00ff87;
            --accent-red: #ff416c;
            --text-main: #ffffff;
            --text-muted: #8fa0dd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 198, 255, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(0, 255, 135, 0.03) 0%, transparent 40%);
        }

        /* 頂部導覽列 */
        header {
            background: rgba(10, 15, 29, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-glow);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .user-info {
            color: var(--text-muted);
            font-size: 14px;
        }

        .user-info i {
            margin-right: 8px;
            color: var(--accent-blue);
        }

        /* 主體佈局 */
        main {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .workbench-title {
            margin-bottom: 30px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .workbench-title i {
            color: var(--accent-blue);
        }

        /* 數據統計概覽卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .stat-number {
            font-size: 36px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            margin-top: 5px;
        }

        .stat-card.pending { border-left: 4px solid var(--accent-blue); }
        .stat-card.pending .stat-number { color: var(--accent-blue); }

        .stat-card.active { border-left: 4px solid var(--accent-green); }
        .stat-card.active .stat-number { color: var(--accent-green); }

        /* 工作台主表格面版 */
        .table-container {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glow);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            text-align: left;
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            padding: 16px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
        }

        td {
            padding: 20px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            font-size: 15px;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* 狀態標籤 */
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(0, 198, 255, 0.1);
            color: var(--accent-blue);
            border: 1px solid rgba(0, 198, 255, 0.3);
        }

        /* 按鈕樣式 */
        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-approve {
            background: linear-gradient(135deg, #00ff87, #60efff);
            color: #000;
            font-weight: 700;
        }

        .btn-approve:hover {
            box-shadow: 0 0 15px rgba(0, 255, 135, 0.5);
            transform: translateY(-2px);
        }

        .btn-reject {
            background: transparent;
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .btn-reject:hover {
            background: rgba(255, 65, 108, 0.1);
            box-shadow: 0 0 15px rgba(255, 65, 108, 0.2);
            transform: translateY(-2px);
        }

        /* 暫停（黃）/ 恢復（綠）/ 刪除（紅實心）按鈕 */
        .btn-suspend {
            background: transparent;
            color: #ffc861;
            border: 1px solid #ffc861;
        }
        .btn-suspend:hover {
            background: rgba(255, 200, 97, 0.1);
            box-shadow: 0 0 15px rgba(255, 200, 97, 0.2);
            transform: translateY(-2px);
        }
        .btn-resume {
            background: transparent;
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }
        .btn-resume:hover {
            background: rgba(0, 255, 135, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 135, 0.2);
            transform: translateY(-2px);
        }
        .btn-delete {
            background: var(--accent-red);
            color: #fff;
            font-weight: 700;
        }
        .btn-delete:hover {
            box-shadow: 0 0 15px rgba(255, 65, 108, 0.5);
            transform: translateY(-2px);
        }

        /* 狀態徽章變體 */
        .badge.active {
            background: rgba(0, 255, 135, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(0, 255, 135, 0.3);
        }
        .badge.suspended {
            background: rgba(255, 200, 97, 0.1);
            color: #ffc861;
            border: 1px solid rgba(255, 200, 97, 0.3);
        }

        /* 區塊分隔標題 */
        .section-title {
            margin: 50px 0 20px;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
        }
        .section-title i { color: var(--accent-green); }

        /* 空狀態 */
        .empty-state {
            text-align: center;
            padding: 60px 0;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>OXBRIDGE WORKBENCH</h1>
        </div>
        <div class="user-info">
            <i class="fa-solid fa-user-shield"></i>當前權限：超級管理員 (SuperAdmin)
            <button onclick="handleLogout()" style="margin-left:16px;padding:6px 12px;border-radius:6px;border:1px solid var(--accent-red);background:transparent;color:var(--accent-red);cursor:pointer;font-size:12px;">
                <i class="fa-solid fa-right-from-bracket"></i> 登出
            </button>
        </div>
    </header>

    <main>
        <h2 class="workbench-title">
            <i class="fa-solid fa-layer-group"></i> 租戶開通審核工作台
        </h2>

        <div class="stats-grid">
            <div class="stat-card pending">
                <div>
                    <div style="color: var(--text-muted); font-size: 14px;">待處理申請</div>
                    <div class="stat-number" id="pending-count">0</div>
                </div>
                <i class="fa-solid fa-clock-rotate-left" style="font-size: 32px; color: var(--accent-blue);"></i>
            </div>
            <div class="stat-card active">
                <div>
                    <div style="color: var(--text-muted); font-size: 14px;">已開通租戶</div>
                    <div class="stat-number" id="active-count">0</div>
                </div>
                <i class="fa-solid fa-building-circle-check" style="font-size: 32px; color: var(--accent-green);"></i>
            </div>
        </div>

        <div class="table-container">
            <div id="loading-view" style="text-align: center; padding: 20px; color: var(--accent-blue);">
                <i class="fa-solid fa-spinner fa-spin"></i> 正在連線路網資料庫...
            </div>
            
            <table id="schools-table" style="display: none;">
                <thead>
                    <tr>
                        <th>學校編號</th>
                        <th>學校名稱</th>
                        <th>主校區地址</th>
                        <th>目前狀態</th>
                        <th style="text-align: right;">決策操作</th>
                    </tr>
                </thead>
                <tbody id="schools-tbody">
                    </tbody>
            </table>

            <div id="empty-view" class="empty-state" style="display: none;">
                <i class="fa-regular fa-folder-open"></i>
                <p>完美！目前沒有任何待審核的學校申請。</p>
            </div>
        </div>

        <!-- 已開通 / 已暫停 租戶管理 -->
        <h2 class="section-title">
            <i class="fa-solid fa-users-gear"></i> 已開通租戶管理
        </h2>
        <div class="table-container">
            <div id="managed-loading-view" style="text-align: center; padding: 20px; color: var(--accent-green);">
                <i class="fa-solid fa-spinner fa-spin"></i> 正在載入租戶清單...
            </div>

            <table id="managed-table" style="display: none;">
                <thead>
                    <tr>
                        <th>學校編號</th>
                        <th>學校名稱</th>
                        <th>管理員帳號</th>
                        <th>目前狀態</th>
                        <th style="text-align: right;">租戶操作</th>
                    </tr>
                </thead>
                <tbody id="managed-tbody"></tbody>
            </table>

            <div id="managed-empty-view" class="empty-state" style="display: none;">
                <i class="fa-regular fa-building"></i>
                <p>目前還沒有已開通的租戶。</p>
            </div>
        </div>
    </main>

    <script>
        // 鉴权已由 <head> 中的 auth_guard.js + checkAuth('SuperAdmin') 完成

        function getAuthHeaders() {
            return {
                'Authorization': 'Bearer ' + localStorage.getItem('access_token'),
                'Content-Type': 'application/json',
            };
        }

        function handleLogout() {
            logout(); // 调用 auth_guard.js 中的统一退出
        }

        // 頁面載入時自動拉取後端真實數據
        document.addEventListener("DOMContentLoaded", () => {
            fetchPendingSchools();
            fetchManagedSchools();
        });

        async function fetchPendingSchools() {
            try {
                const response = await fetch('/api/admin/pending_schools', {
                    headers: getAuthHeaders(),
                });

                if (response.status === 401 || response.status === 403) {
                    alert('登录已过期，请重新登录');
                    handleLogout();
                    return;
                }

                const schools = await response.json();
                
                document.getElementById("loading-view").style.display = "none";
                document.getElementById("pending-count").innerText = schools.length;

                if (schools.length === 0) {
                    document.getElementById("schools-table").style.display = "none";
                    document.getElementById("empty-view").style.display = "block";
                    return;
                }

                document.getElementById("empty-view").style.display = "none";
                document.getElementById("schools-table").style.display = "table";
                
                const tbody = document.getElementById("schools-tbody");
                tbody.innerHTML = ""; // 清空舊數據

                schools.forEach(school => {
                    // 兼容後端 id 或 school_id 的欄位命名
                    const schoolId = school.id || school.school_id;
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td style="font-family: 'Orbitron', sans-serif; color: var(--accent-blue);">#00${schoolId}</td>
                        <td style="font-weight: 700;">${school.school_name}</td>
                        <td><i class="fa-solid fa-location-dot" style="color: var(--text-muted); margin-right:6px;"></i>${school.address || '無地址資訊'}</td>
                        <td><span class="badge">待審核</span></td>
                        <td style="text-align: right;">
                            <div class="btn-group" style="justify-content: flex-end;">
                                <button class="btn btn-approve" onclick="executeReview(${schoolId}, '已通过')">
                                    <i class="fa-solid fa-check"></i> 批准開通
                                </button>
                                <button class="btn btn-reject" onclick="executeReview(${schoolId}, '已拒绝')">
                                    <i class="fa-solid fa-xmark"></i> 駁回申請
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (error) {
                console.error("拉取數據失敗:", error);
                document.getElementById("loading-view").innerText = "連線後端資料庫失敗，請確認 FastAPI 服務已啟動。";
            }
        }

        // 點擊按鈕觸發審核決策發送給後端
        async function executeReview(schoolId, decision) {
            let reason = null;
            if (decision === '已拒绝') {
                reason = prompt("請輸入拒絕開通的具體原因：");
                if (reason === null) return; // 使用者點擊取消，中止操作
            }

            try {
                const response = await fetch('/api/admin/review_school', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({
                        school_id: schoolId,
                        decision: decision,
                        reason: reason
                    })
                });

                const result = await response.json();
                if (response.ok) {
                    alert(`操作成功：${result.message}`);
                    fetchPendingSchools(); // 重新整理待審列表
                    fetchManagedSchools(); // 批准後該校會進入已開通列表
                } else {
                    // detail 可能是字串（HTTPException）或物件陣列（422 校驗錯誤），統一轉成可讀文字
                    let detail = result.detail;
                    if (Array.isArray(detail)) {
                        detail = detail.map(e => `${e.loc?.join('.') ?? ''}: ${e.msg}`).join('; ');
                    } else if (detail && typeof detail === 'object') {
                        detail = JSON.stringify(detail);
                    }
                    alert(`操作失敗: ${detail ?? '未知錯誤 (HTTP ' + response.status + ')'}`);
                }
            } catch (error) {
                alert("發送審核決策時發生網路錯誤！");
            }
        }

        // === 已開通租戶管理 ===
        async function fetchManagedSchools() {
            try {
                const response = await fetch('/api/admin/managed_schools', {
                    headers: getAuthHeaders(),
                });

                if (response.status === 401 || response.status === 403) {
                    handleLogout();
                    return;
                }

                const schools = await response.json();

                document.getElementById("managed-loading-view").style.display = "none";
                document.getElementById("active-count").innerText = schools.length;

                const table = document.getElementById("managed-table");
                const emptyView = document.getElementById("managed-empty-view");

                if (schools.length === 0) {
                    table.style.display = "none";
                    emptyView.style.display = "block";
                    return;
                }

                emptyView.style.display = "none";
                table.style.display = "table";

                const tbody = document.getElementById("managed-tbody");
                tbody.innerHTML = "";

                schools.forEach(school => {
                    const isSuspended = school.approval_status === "已暂停";
                    const badgeClass = isSuspended ? "suspended" : "active";
                    const badgeText = isSuspended ? "已暫停" : "運作中";

                    // 暫停中顯示「恢復」按鈕，運作中顯示「暫停」按鈕
                    const toggleBtn = isSuspended
                        ? `<button class="btn btn-resume" onclick="toggleStatus(${school.school_id}, 'resume')">
                               <i class="fa-solid fa-play"></i> 恢復
                           </button>`
                        : `<button class="btn btn-suspend" onclick="toggleStatus(${school.school_id}, 'suspend')">
                               <i class="fa-solid fa-pause"></i> 暫停
                           </button>`;

                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td style="font-family: 'Orbitron', sans-serif; color: var(--accent-green);">#00${school.school_id}</td>
                        <td style="font-weight: 700;">${school.school_name}</td>
                        <td>
                            <div>${school.admin_username || '—'}</div>
                            <div style="font-size:12px;color:var(--text-muted);">${school.admin_email || ''}</div>
                        </td>
                        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                        <td style="text-align: right;">
                            <div class="btn-group" style="justify-content: flex-end;">
                                ${toggleBtn}
                                <button class="btn btn-delete" onclick="deleteSchool(${school.school_id}, '${(school.school_name || '').replace(/'/g, "\\'")}')">
                                    <i class="fa-solid fa-trash"></i> 刪除
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (error) {
                console.error("拉取租戶清單失敗:", error);
                document.getElementById("managed-loading-view").innerText = "載入租戶清單失敗，請確認後端服務已啟動。";
            }
        }

        // 暫停 / 恢復租戶
        async function toggleStatus(schoolId, action) {
            const actionText = action === 'suspend' ? '暫停' : '恢復';
            if (action === 'suspend' &&
                !confirm(`確定要暫停該租戶嗎？暫停後其管理員將無法登入系統。`)) {
                return;
            }

            try {
                const response = await fetch('/api/admin/toggle_school_status', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ school_id: schoolId, action: action })
                });
                const result = await response.json();
                if (response.ok) {
                    alert(`操作成功：${result.message}`);
                    fetchManagedSchools();
                } else {
                    alert(`${actionText}失敗：${result.detail ?? '未知錯誤'}`);
                }
            } catch (error) {
                alert(`執行${actionText}操作時發生網路錯誤！`);
            }
        }

        // 刪除租戶（二次確認，避免誤刪）
        async function deleteSchool(schoolId, schoolName) {
            if (!confirm(`⚠️ 危險操作！\n\n確定要永久刪除租戶「${schoolName}」嗎？\n該校的所有管理員、學生與路線資料都將一併刪除，此操作無法復原。`)) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/school/${schoolId}`, {
                    method: 'DELETE',
                    headers: getAuthHeaders(),
                });
                const result = await response.json();
                if (response.ok) {
                    alert(`刪除成功：${result.message}`);
                    fetchManagedSchools();
                } else {
                    alert(`刪除失敗：${result.detail ?? '未知錯誤'}`);
                }
            } catch (error) {
                alert("執行刪除操作時發生網路錯誤！");
            }
        }
    </script>
</body>
</html>
